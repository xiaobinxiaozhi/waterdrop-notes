<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>水滴笔记</title>
<style>body{margin:0;background:#faf8f4;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1a2332;font-family:sans-serif}main{text-align:center}p{font-size:16px;color:#5a6a7a}</style>
</head>
<body>
<main><h2>⏳ 加载中...</h2><p>请稍候</p></main>
<script>
fetch('./index.html?_t='+Date.now()).then(r=>r.text()).then(html=>{
  document.open(); document.write(html); document.close();
}).catch(e=>{
  document.querySelector('main').innerHTML='<h2>❌ 加载失败</h2><p>'+e.message+'</p>';
});
</script>
</body>
</html>
